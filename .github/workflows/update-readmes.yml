name: Update READMEs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readmes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate README files
        run: python scripts/update_readmes.py

      - name: Check for README changes
        id: readme_changes
        run: |
          if git diff --quiet -- README.md src/README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit README updates
        if: steps.readme_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/README.md
          git commit -m "chore(readme): auto-update generated sections [skip ci]"
          git push
